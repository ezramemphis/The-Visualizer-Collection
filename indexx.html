<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LFO + MIDI Test</title>

  <style>
    body {
      margin: 0;
      background: #0a0a12;
      color: #00ffcc;
      font-family: monospace;
    }

    #devPanel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border: 1px solid rgba(0,255,204,0.2);
      border-radius: 6px;
    }

    .row {
      margin-bottom: 8px;
    }

    label {
      font-size: 10px;
      display: block;
    }

    input[type="range"] {
      width: 160px;
    }
  </style>
</head>
<body>

  <!-- DEV PANEL (this is what LFO + MIDI hook into) -->
  <div id="devPanel">
    <div class="row">
      <label>Speed</label>
      <input id="speed" type="range" min="0" max="10" step="0.01" value="1">
    </div>

    <div class="row">
      <label>Size</label>
      <input id="size" type="range" min="0" max="200" step="1" value="50">
    </div>

    <div class="row">
      <label>Brightness</label>
      <input id="brightness" type="range" min="0" max="1" step="0.01" value="0.5">
    </div>
  </div>

  <canvas id="c"></canvas>

  <script type="module">
    import { initLFO } from "./lfo.js";
    import { initMIDI } from "./midi.js";

    // ============================
    // SETTINGS OBJECT (CRITICAL)
    // ============================
    const settings = {
      speed: 1,
      size: 50,
      brightness: 0.5
    };

    const devPanel = document.getElementById("devPanel");

    // ============================
    // INIT ENGINES
    // ============================
    initLFO(settings, devPanel);
    initMIDI(settings, devPanel);

    // ============================
    // SIMPLE VISUAL (so you SEE changes)
    // ============================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    let t = 0;

    function draw() {
      requestAnimationFrame(draw);

      t += settings.speed * 0.01;

      ctx.fillStyle = "rgba(0,0,0,0.2)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const x = canvas.width / 2 + Math.sin(t) * 200;
      const y = canvas.height / 2;

      ctx.beginPath();
      ctx.arc(x, y, settings.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,255,204,${settings.brightness})`;
      ctx.fill();
    }

    draw();
  </script>

</body>
</html>
