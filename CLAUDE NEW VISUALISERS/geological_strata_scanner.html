<!DOCTYPE html>
<html>
<head><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1208;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace}
canvas{display:block}
#ui{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:12px;flex-wrap:wrap}
button{background:none;border:1px solid #654;color:#a97;padding:5px 14px;border-radius:3px;cursor:pointer;font-family:'Courier New';font-size:11px;letter-spacing:1px}
button:hover{border-color:#c99;color:#dbb}
button.on{border-color:#c99;color:#dbb;text-shadow:0 0 8px #c99}
.knob{display:flex;flex-direction:column;align-items:center;gap:3px}
.klbl{font-size:9px;color:#654;letter-spacing:1px}
input[type=range]{-webkit-appearance:none;width:80px;height:2px;background:#3a2a1a;border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#a87;cursor:pointer}
#tag{font-size:9px;color:#443;letter-spacing:2px;margin-top:8px;text-align:center}
</style></head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button id="startBtn">ACTIVATE SCANNER</button>
  <div class="knob"><span class="klbl">STRATA</span><input type="range" id="strata" min="4" max="18" value="10" step="1"></div>
  <div class="knob"><span class="klbl">PRESSURE</span><input type="range" id="pressure" min="0.5" max="5" value="2" step="0.1"></div>
  <div class="knob"><span class="klbl">FAULT SLIP</span><input type="range" id="fault" min="0" max="80" value="30" step="1"></div>
  <div class="knob"><span class="klbl">EROSION</span><input type="range" id="erosion" min="0" max="1" value="0.4" step="0.05"></div>
</div>
<div id="tag">GEOLOGICAL STRATA SCANNER — SEISMIC AUDIO RENDERER</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 720);
  H = canvas.height = Math.min(window.innerHeight * 0.68, 460);
}
window.addEventListener('resize', resize);
resize();

let analyser, freqData, running = false;
let scanX = 0;
let t = 0;

const ROCK_PALETTES = [
  ['#8B7355','#A0866A','#7A6548'],  // sandstone
  ['#6B6B6B','#808080','#595959'],  // granite
  ['#A0522D','#8B4513','#C06030'],  // red sediment
  ['#4A6741','#3D5735','#5A7A51'],  // shale (mineral stained)
  ['#B8A878','#CAB990','#A09060'],  // limestone
  ['#2D3A2E','#1E2B1F','#3D4E3E'],  // basalt
  ['#8B6914','#7A5C0A','#A07820'],  // iron-stained
  ['#6B4C3B','#5A3D2E','#7C5D4C'],  // mudstone
  ['#C4A882','#D8BC96','#B09470'],  // chalk
];

document.getElementById('startBtn').addEventListener('click', async () => {
  if (!running) {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const ac = new AudioContext();
    const src = ac.createMediaStreamSource(stream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    src.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    running = true;
    document.getElementById('startBtn').textContent = '● SCANNING';
    document.getElementById('startBtn').classList.add('on');
  }
});

function avg(arr,s,e){let v=0;for(let i=s;i<e;i++)v+=arr[i];return v/(e-s)/255}

function noiseAt(x, y, scale, seed) {
  const xi = Math.floor(x * scale + seed);
  const yi = Math.floor(y * scale);
  return (Math.sin(xi * 127.1 + yi * 311.7) * 43758.5453) % 1;
}

function draw() {
  requestAnimationFrame(draw);
  t += 0.01;

  if (running && analyser) analyser.getByteFrequencyData(freqData);

  const bass = freqData ? avg(freqData, 0, 12) : 0;
  const mid  = freqData ? avg(freqData, 12, 60) : 0;
  const high = freqData ? avg(freqData, 60, 180) : 0;

  const numStrata = parseInt(document.getElementById('strata').value);
  const pressure = parseFloat(document.getElementById('pressure').value);
  const faultAmt = parseFloat(document.getElementById('fault').value);
  const erosion  = parseFloat(document.getElementById('erosion').value);

  // Scan line rendering — draw one vertical column per frame
  const scanCols = 3;
  for (let sc = 0; sc < scanCols; sc++) {
    const sx = (scanX + sc) % W;

    for (let layer = 0; layer < numStrata; layer++) {
      const lt = layer / numStrata;
      const pal = ROCK_PALETTES[layer % ROCK_PALETTES.length];

      // Base layer boundaries
      const baseY = (layer / numStrata) * H;
      const layerH = H / numStrata;

      // Audio warps the boundary
      const fi = Math.floor(lt * (freqData ? freqData.length * 0.5 : 100));
      const fv = freqData ? freqData[fi] / 255 : 0;

      // Folding: bass creates anticlines/synclines
      const fold = Math.sin(sx * 0.012 + layer * 0.8 + t * 0.5) * bass * pressure * 40;
      // Fault displacement
      const faultLine = W * 0.5 + Math.sin(t * 0.2) * W * 0.15;
      const faultDisp = sx > faultLine ? mid * faultAmt : 0;
      // Ripple from high freq
      const ripple = Math.sin(sx * 0.04 + t * 3 + layer * 0.6) * high * 12;

      const y = baseY + fold + faultDisp + ripple;
      const h = layerH + fv * pressure * 12;

      // Rock color with noise texture
      const noiseVal = (noiseAt(sx, layer, 0.1, layer * 77) + 1) * 0.5;
      const baseColor = pal[Math.floor(noiseVal * pal.length)];
      const r = parseInt(baseColor.slice(1,3),16);
      const g = parseInt(baseColor.slice(3,5),16);
      const b2 = parseInt(baseColor.slice(5,7),16);

      // Grain texture: pixel variation
      const grain = (Math.random() - 0.5) * 20;

      ctx.fillStyle = `rgb(${Math.max(0,Math.min(255,r+grain))},${Math.max(0,Math.min(255,g+grain))},${Math.max(0,Math.min(255,b2+grain))})`;
      ctx.fillRect(sx, y, 1, h + 1);

      // Stratum boundary line
      if (layer > 0) {
        ctx.fillStyle = `rgba(0,0,0,${0.4 + noiseVal * 0.3})`;
        ctx.fillRect(sx, y, 1, 1.5);
      }

      // Erosion surface at top layer
      if (layer === 0 && erosion > 0) {
        const erosionH = erosion * 30 + Math.sin(sx * 0.03 + t) * erosion * 15;
        ctx.fillStyle = `rgba(20,14,8,${0.8})`;
        ctx.fillRect(sx, 0, 1, Math.max(0, y + erosionH));
      }
    }

    // Fault line visual
    const faultLineX = W * 0.5 + Math.sin(t * 0.2) * W * 0.15;
    if (Math.abs(sx - faultLineX) < 2) {
      ctx.fillStyle = `rgba(${200 + bass*55},${80 + bass*50},0,${0.6 + bass*0.4})`;
      ctx.fillRect(sx, 0, 1, H);
    }
  }

  // Active scan line glow
  ctx.fillStyle = `rgba(255,200,100,${0.12 + bass * 0.2})`;
  ctx.fillRect(scanX, 0, 4, H);
  ctx.fillStyle = `rgba(255,230,150,0.7)`;
  ctx.fillRect(scanX + 1, 0, 1, H);

  // Depth labels on left margin
  ctx.fillStyle = 'rgba(10,8,4,0.7)';
  ctx.fillRect(0, 0, 52, H);
  const numStrata2 = parseInt(document.getElementById('strata').value);
  for (let i = 0; i < numStrata2; i++) {
    const ly = (i / numStrata2) * H + (H / numStrata2) * 0.5;
    ctx.fillStyle = 'rgba(180,150,100,0.6)';
    ctx.font = '8px Courier New';
    ctx.fillText(`${(i * 50).toString().padStart(3,'0')}m`, 4, ly + 3);
  }

  // Seismograph line at bottom
  const seisY = H - 30;
  ctx.fillStyle = 'rgba(10,8,4,0.9)';
  ctx.fillRect(0, seisY, W, 30);
  ctx.fillStyle = `rgba(${200 + bass*55},${120 + mid*80},50,0.9)`;
  ctx.fillRect(scanX, seisY + 15 - bass * 12, 2, bass * 24 + 1);

  scanX = (scanX + scanCols) % W;
}

// Draw initial background
ctx.fillStyle = '#1a1208';
ctx.fillRect(0,0,W,H);
draw();
</script>
</body>
</html>
